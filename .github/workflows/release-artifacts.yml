name: Build and Upload Release Artifacts

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build artifacts for"
        required: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-and-upload:
    name: Build and Upload Release Artifacts
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        ocaml-version: ["5.4"]
    env:
      INSTALL_PREFIX: ${{ github.workspace }}/dune-destdir

    defaults:
      run:
        shell: bash

    steps:
      - name: Set TAG_NAME variable
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            # workflow_dispatch case
            echo "TAG_NAME=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            # push tags case
            echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            echo "::error::Could not determine tag name"
            exit 1
          fi

      - name: Wait for release to be created
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for i in {1..30}; do
            if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
              echo "Release found for tag $TAG_NAME"
              exit 0
            fi
            echo "Waiting for release... (attempt $i/30)"
            sleep 10
          done
          echo "::error::Release for tag $TAG_NAME was never created after 5 minutes"
          exit 1

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Environment setup
        run: |
          echo "DUNE_WORKSPACE=$PWD/dune-workspace-${{ matrix.ocaml-version }}" >> "$GITHUB_ENV"

      - name: Setup Dune
        uses: mbarbin/setup-dune@ae2985bcdedc6fb24e5743d6f9dace9cf262b41c # v2.0.0+patch-4
        with:
          version: "3.21.0"
          workspace: ${{ env.DUNE_WORKSPACE }}
          cache-prefix: "main-ci-${{ matrix.ocaml-version }}"
          cache-readonly: true
          steps: install-dune enable-pkg lazy-update-depexts install-gpatch install-depexts

      - name: Build and Install Artifacts
        run: |
          mkdir -p "$INSTALL_PREFIX"
          dune build --profile=release @install
          dune install cubzzle --profile=release --prefix="$INSTALL_PREFIX"

      - name: Prepare Artifacts
        run: |
          os=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          arch=$(uname -m)
          bin_name="${{ github.workspace }}/cubzzle-$TAG_NAME-$os-$arch"
          cp "$INSTALL_PREFIX/bin/cubzzle" "$bin_name"
          echo "BIN_NAME=$bin_name" >> $GITHUB_ENV
          archive_name="${bin_name}.tar.gz"
          tar -czf "$archive_name" -C "$INSTALL_PREFIX/bin" cubzzle
          echo "ARCHIVE_NAME=$archive_name" >> $GITHUB_ENV

      - name: Attest Build Provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            ${{ env.BIN_NAME }}
            ${{ env.ARCHIVE_NAME }}

      - name: Upload Platform-Specific Binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$TAG_NAME" "$ARCHIVE_NAME" --repo "$GITHUB_REPOSITORY" --clobber
